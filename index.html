<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://kit.fontawesome.com/9603d0f2dd.js" crossorigin="anonymous"></script>
  <!--- font  font-family: 'Courgette', cursive; font-family: 'Kanit', sans-serif;------>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Courgette&family=Kanit:wght@200&display=swap" rel="stylesheet">
	<!--- font  font-family: 'Courgette', cursive; font-family: 'Kanit', sans-serif;------>
</head>

<body>

    <style>
        .font_modern{
            font-family: 'Courgette', cursive; font-family: 'Kanit', sans-serif;
        }
    </style>

<div id="main"
class="w-full min-h-screen bg-[url(asset/forest.jpg)] bg-no-repeat bg-cover bg-center">

  <!-- Center Container -->
  <div class="min-h-screen flex justify-center items-center px-4">

    <!-- Card -->
    <div
      class="w-full sm:w-3/4 md:w-1/2 lg:w-1/3 text-center flex flex-col gap-4">

      <!-- Top Section -->
      <div
        class="flex flex-col sm:flex-row justify-center items-center gap-4">

        <!-- Profile Image -->
         <div class="flex flex-col justify-center items-center">
            <div>
                <img
                    src="asset/rimon.jpg"
                    alt="profile"
                    class="w-16 h-16 sm:w-20 sm:h-20 rounded-full object-cover"
                />
            </div>
         </div>
        

        <!-- Logo -->
        <div class="flex justify-center sm:justify-start w-full sm:w-auto">
          <img
            src="asset/rlab1.png"
            alt="logo"
            class="w-32 sm:w-40 h-auto object-contain"
          />
        </div>

      </div>

      <!---Description-->
      <div class="text-white text-center">
        <p class="text-md font_modern">Rimon Rony | Full Stack <span class="font-extrabold text-yellow-500 text-2xl">M E R N</span> Developer</p>
        
        <div class="flex flex-row justify-center items-center gap-3 py-3 mt-2  bg-green/30 backdrop-blur-md [mask-image:linear-gradient(to_right,transparent,green_20%,green_80%,transparent)]">
            <img class="w-6 h-auto" src="asset/icons8-nodejs-48.png"><img class="w-6 h-auto" src="asset/icons8-react-48.png">
            <img class="w-6 h-auto" src="asset/icons8-nextjs-48.png"><img class="w-6 h-auto" src="asset/icons8-express-js-48.png">
            <img class="w-6 h-auto" src="asset/icons8-nestjs-48.png"><img class="w-6 h-auto" src="asset/icons8-mongodb-48.png">
            <img class="w-6 h-auto" src="asset/icons8-postgresql-48.png"><img class="w-6 h-auto" src="asset/icons8-mysql-48.png">
            <img class="w-6 h-auto" src="asset/icons8-laravel-64.png">
        </div>
      </div>
      <!-- Buttons -->
      <div
        class="flex flex-row justify-center gap-4 text-white font_modern">

        <button
          class="px-4 py-2 border border-red-500 hover:bg-red-500 transition text-sm">
          <i class="fa-solid fa-user px-1"></i> Profile
        </button>

        <button
          class="px-4 py-2 border border-cyan-500 hover:bg-cyan-500 transition text-sm">
          Projects
        </button>

        <a href="https://github.com/Rimon-Mahamud-Rony/">
          <button
            class="px-4 py-2 border border-green-400 hover:bg-green-400 transition text-sm cursor-pointer">
            Contact
          </button>
        </a>

      </div>

    </div>
  </div>
</div>

</body>
</html>
